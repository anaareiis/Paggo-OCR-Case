services:
  - type: web
    name: paggo-ocr-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paggo-ocr-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: PORT
        value: "3001"
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: paggo-ocr-db
    plan: free
    databaseName: paggo
    user: paggo
